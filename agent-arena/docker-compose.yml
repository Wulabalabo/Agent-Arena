services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      AGENT_ARENA_RUNTIME_MODE: ${AGENT_ARENA_RUNTIME_MODE:-mock}
      AGENT_ARENA_NETWORK: ${AGENT_ARENA_NETWORK:-testnet}
      AGENT_ARENA_FRONTEND_BASE_URL: ${AGENT_ARENA_FRONTEND_BASE_URL:-http://localhost}
      AGENT_ARENA_SUI_RPC_URL: ${AGENT_ARENA_SUI_RPC_URL:-https://fullnode.testnet.sui.io:443}
      AGENT_ARENA_PREDICT_SERVER_URL: ${AGENT_ARENA_PREDICT_SERVER_URL:-https://predict-server.testnet.mystenlabs.com}
      AGENT_ARENA_PREDICT_PACKAGE_ID: ${AGENT_ARENA_PREDICT_PACKAGE_ID:-0xf5ea2b3749c65d6e56507cc35388719aadb28f9cab873696a2f8687f5c785138}
      AGENT_ARENA_PREDICT_OBJECT_ID: ${AGENT_ARENA_PREDICT_OBJECT_ID:-0xc8736204d12f0a7277c86388a68bf8a194b0a14c5538ad13f22cbd8e2a38028a}
      AGENT_ARENA_SUI_CLOCK_OBJECT_ID: ${AGENT_ARENA_SUI_CLOCK_OBJECT_ID:-0x6}
      AGENT_ARENA_QUOTE_ASSET_TYPE: ${AGENT_ARENA_QUOTE_ASSET_TYPE:-0xe95040085976bfd54a1a07225cd46c8a2b4e8e2b6732f140a0fc49850ba73e1a::dusdc::DUSDC}
      AGENT_ARENA_QUOTE_DECIMALS: ${AGENT_ARENA_QUOTE_DECIMALS:-6}
      AGENT_ARENA_PRICE_DECIMALS: ${AGENT_ARENA_PRICE_DECIMALS:-9}
      AGENT_ARENA_INTERNAL_TOKEN: ${AGENT_ARENA_INTERNAL_TOKEN:-}
      AGENT_ARENA_WALLET_SECRET: ${AGENT_ARENA_WALLET_SECRET:-}
      AGENT_ARENA_ENABLE_PREDICT_SUBMIT: ${AGENT_ARENA_ENABLE_PREDICT_SUBMIT:-false}
      AGENT_ARENA_BACKEND_HOST: 0.0.0.0
      PORT: 8787
      AGENT_ARENA_PLATFORM_DB_PATH: /app/data/agent-arena.sqlite
      AGENT_ARENA_DB_PATH: /app/data/agent-arena.sqlite
      AGENT_ARENA_WALLET_STORE_PATH: /app/data/internal-wallets.json
    expose:
      - "8787"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_AGENT_ARENA_API_URL: /api/arena
        VITE_AGENT_ARENA_SITE_URL: ${AGENT_ARENA_FRONTEND_BASE_URL:-http://localhost}
    expose:
      - "8080"
    restart: unless-stopped

  proxy:
    image: caddy:2.9-alpine
    depends_on:
      - backend
      - frontend
    environment:
      AGENT_ARENA_SITE_ADDRESS: ${AGENT_ARENA_SITE_ADDRESS:-http://localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  backend-data:
  caddy-data:
  caddy-config:
